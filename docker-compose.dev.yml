services:
  postgres:
    image: postgres:16
    container_name: chat_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
       - D:/DockerData/Ayush/chat-postgres:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"